<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="portal-header">
        <div class="header-left">
            <img src="https://bkpsitecpsnew.blob.core.windows.net/uploadsitecps/sites/1/2022/10/centro-paula-souza-logo.svg" alt="Logo" class="header-logo">
            <h1 class="header-title">Portal do Aluno</h1>
        </div>
        <a href="login.html" class="btn-logout">Sair</a>
    </header>

    <div class="portal-container">
        <aside class="sidebar">
            <div class="student-info">
                <!-- ID "profile-img" adicionada aqui -->
                <img src="" alt="Foto do Aluno" class="student-photo" id="profile-img">
                <h3 id="student-name">Nome</h3>
                <p id="student-ra">RA: 000</p>
            </div>
            <nav class="main-menu">
                <ul>
                    <li><a href="#" class="active" id="menu-inicio"><i class="fas fa-home"></i> Início</a></li>
                    <li><a href="#" id="menu-cursos"><i class="fas fa-graduation-cap"></i> Meus Cursos</a></li>
                    <li><a href="#" id="menu-materias"><i class="fas fa-book-open"></i> Matérias</a></li>
                    <li><a href="#" id="menu-financeiro"><i class="fas fa-wallet"></i> Financeiro</a></li>
                    <li><a href="#" id="menu-carteirinha"><i class="fas fa-id-card"></i> Carteirinha Virtual</a></li>
                </ul>
            </nav>
        </aside>

        <main class="content" id="main-content">
            <h2 id="welcome-title">Bem-vindo(a)!</h2>
            <div class="dashboard-grid">
                <a href="#" class="dashboard-card" id="quick-link-cursos"><i class="fas fa-graduation-cap"></i><h3>Cursos</h3></a>
                <a href="#" class="dashboard-card" id="quick-link-materias"><i class="fas fa-book-open"></i><h3>Matérias</h3></a>
                <a href="#" class="dashboard-card" id="quick-link-financeiro"><i class="fas fa-wallet"></i><h3>Financeiro</h3></a>
                <a href="#" class="dashboard-card" id="quick-link-carteirinha"><i class="fas fa-id-card"></i><h3>Carteirinha</h3></a>
            </div>
        </main>
    </div>

    <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal-content">
            <span class="close-modal-btn" id="close-modal">&times;</span>
            <!-- IDs adicionadas para troca dinâmica -->
            <img src="" alt="Carteirinha" class="modal-image" id="modal-img">
            <a href="" download class="btn btn-download" id="download-link">Baixar Carteirinha (PDF)</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
